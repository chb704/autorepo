name: Design Review

on:
  pull_request:
    paths:
      - "apps/**"
      - "packages/**/ui/**"
      - "docs/DESIGN.md"

permissions:
  contents: read
  pull-requests: write

jobs:
  design-review:
    name: Frontend design review
    runs-on: ubuntu-latest

    steps:
      - name: Check out base branch only
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Collect PR diff
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr diff "$PR_NUMBER" --patch > pr.diff
          test -s pr.diff
          test -s docs/DESIGN.md

      - name: Run design review placeholder
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "::notice title=Design Review not wired::Set ANTHROPIC_API_KEY and replace this placeholder with your design review model call."
            exit 0
          fi

          cat > design-review-prompt.md <<'PROMPT'
          Review this frontend PR against docs/DESIGN.md. Block drift from the
          documented product vision. Give specific, actionable feedback. Do not
          execute code from the PR.
          PROMPT

          echo "::notice title=Design Review placeholder::pr.diff, docs/DESIGN.md, and design-review-prompt.md are ready. Wire your provider CLI here."
